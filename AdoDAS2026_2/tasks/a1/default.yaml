
#torchrun --standalone --nproc_per_node=2 train.py --task a1 --config tasks/a1/default.yaml


feature_root: /home/adodas/dataset
manifest_dir: /home/adodas/dataset/manifests
output_dir: /home/adodas/AdoDAS2026_2/outputs/a1

feature_selection:
  audio_features:
    - mel_mfcc
    - vad
    - egemaps
    - ssl_embed
  video_features:
    - headpose_geom
    - face_behavior
    - qc_stats
    - vad_agg
    # - body_pose
    # - global_motion
    - vision_ssl_embed
  audio_ssl_model_tag: wav2vec2-chinese-xlsr
  video_ssl_model_tag: dinov2-large

mask_policy: and_core
core_audio: [mel_mfcc, ssl_embed]
core_video: [vision_ssl_embed, qc_stats]

d_adapter: 64
d_model: 256
tcn_layers: 6
tcn_kernel_size: 3
asp_alpha: 0.5
asp_beta: 0.5
dropout: 0.2
d_shared: 256

aggregator: mlp
# 双卡 DDP: torchrun --standalone --nproc_per_node=2 train.py --task a1 --config <本文件>
# batch_size 表示全局 participant batch，会除以 GPU 数；例如 64 与 2 卡 -> 每卡 32，显存约减半。
# runner 在 DDP 下默认 NCCL_IB_DISABLE=1（避免无 IB 机器上 verbs 导致 SIGSEGV）；多机 InfiniBand 请 export NCCL_IB_DISABLE=0。
# 若仍遇 NCCL/退出异常可临时: export NCCL_DEBUG=INFO
# 单卡要「等效大 batch」可后续在 runner 增加 gradient_accumulation_steps（当前未接 YAML）。
batch_size: 64
lr: 0.0005
weight_decay: 0.01
warmup_epochs: 1
epochs: 30
seed: 42
num_workers: 8
amp: true
preload: true
grad_clip: 1.0
use_pos_weight: true
patience: 6
session_loss_weight: 0.2
session_type_loss_weight: 0.15
submission_level: participant
decode_method: auto
label_smoothing: 0.05
feature_noise_std: 0.0
session_drop_prob: 0.0
early_stop_metric: primary

# TCN 前 SafeNorm：默认关闭（E0 baseline）。E1/E2 见仓库文档改layernorm.md。
pre_tcn_safenorm:
  enabled: true
  stats_path: outputs/stats/a1_safenorm_meanstd_train.npz
  norm_type: mean_std
  clip_value: 5.0
  eps: 1.0e-06

  low_dim_no_layernorm: false

  apply_groups:
  - mel_mfcc
  - egemaps
  - headpose_geom
  - face_behavior

  skip_groups:
  - vad
  - vad_agg
  - qc_stats
  - ssl_embed
  - vision_ssl_embed