feature_root: /media/k3nwong/Data1/test/outputs/pipeline/anonymized
manifest_dir: /media/k3nwong/Data1/test/outputs/data
output_dir: /media/k3nwong/Data1/test/adodas_baseline/output/a2

feature_selection:
  audio_features:
    - mel_mfcc
    - vad
    - egemaps
    - ssl_embed
  video_features:
    - headpose_geom
    - face_behavior
    - qc_stats
    - vad_agg
    # - body_pose
    # - global_motion
    - vision_ssl_embed
  audio_ssl_model_tag: chinese-hubert-large
  video_ssl_model_tag: vit-mae-base

mask_policy: and_core
core_audio: [mel_mfcc, ssl_embed]
core_video: [vision_ssl_embed, qc_stats]

d_adapter: 64
d_model: 256
tcn_layers: 6
tcn_kernel_size: 3
asp_alpha: 0.5
asp_beta: 0.5
dropout: 0.2
d_shared: 256

aggregator: mlp
use_coral: true
batch_size: 64
lr: 0.001
weight_decay: 0.01
warmup_epochs: 3
epochs: 40
seed: 42
num_workers: 8
amp: true
preload: true
grad_clip: 1.0
use_pos_weight: true
patience: 8
session_loss_weight: 0.5
session_type_loss_weight: 0.15
submission_level: participant
decode_method: auto
label_smoothing: 0.05
feature_noise_std: 0.01
session_drop_prob: 0.1
early_stop_metric: val_loss
